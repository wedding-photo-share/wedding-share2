<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Photo Share — 起動中...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --grad: linear-gradient(135deg, #7c3aed 0%, #db2777 55%, #ea580c 100%);
    }

    body {
      font-family: 'Poppins', -apple-system, sans-serif;
      background: linear-gradient(150deg, #f3e8ff 0%, #fce7f3 50%, #fff0e6 100%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      color: #1e0a2e;
    }

    /* タイトル */
    h1 {
      font-size: 1.7rem;
      font-weight: 800;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      font-size: 0.78rem;
      color: #9d72b8;
      margin-bottom: 52px;
      text-align: center;
      font-weight: 400;
    }

    /* スピナー */
    .spinner-wrap {
      position: relative;
      width: 88px;
      height: 88px;
      margin-bottom: 36px;
    }

    .spinner-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 5px solid transparent;
      border-top-color: #7c3aed;
      border-right-color: #db2777;
      animation: spin 1.1s linear infinite;
    }

    .spinner-ring-outer {
      border: 5px solid rgba(124, 58, 237, 0.12);
      animation: none;
    }

    .spinner-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ステータステキスト */
    .status-text {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1e0a2e;
      margin-bottom: 8px;
      text-align: center;
      min-height: 1.4em;
    }

    .status-sub {
      font-size: 0.76rem;
      color: #9d72b8;
      text-align: center;
      font-weight: 400;
      margin-bottom: 28px;
    }

    /* プログレスバー */
    .progress-wrap {
      width: 220px;
      height: 4px;
      background: rgba(124, 58, 237, 0.12);
      border-radius: 50px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 100%;
      background: var(--grad);
      border-radius: 50px;
      width: 0%;
      transition: width 1s linear;
    }

    .elapsed {
      font-size: 0.72rem;
      color: #c4a8d8;
      text-align: center;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
    }

    /* 完了後 */
    .ready-icon {
      display: none;
      width: 88px;
      height: 88px;
      border-radius: 26px;
      background: var(--grad);
      align-items: center;
      justify-content: center;
      margin-bottom: 36px;
      box-shadow: 0 8px 28px rgba(219,39,119,0.32);
      font-size: 2rem;
      animation: pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>

  <h1>Wedding Photo Share</h1>
  <p class="subtitle">思い出の写真をシェアしてください</p>

  <!-- ローディング -->
  <div class="spinner-wrap" id="spinner">
    <div class="spinner-ring spinner-ring-outer"></div>
    <div class="spinner-ring"></div>
    <div class="spinner-icon">🌸</div>
  </div>

  <!-- 完了アイコン（非表示→起動後に表示） -->
  <div class="ready-icon" id="ready-icon">✓</div>

  <div class="status-text" id="status-text">サーバーを起動しています...</div>
  <div class="status-sub" id="status-sub">最大50秒ほどかかります。そのままお待ちください</div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <div class="elapsed" id="elapsed">0秒経過</div>

<script>
  const RENDER_URL = 'https://wedding-memories-b0at.onrender.com';
  const HEALTH_URL = RENDER_URL + '/health';
  const MAX_SECONDS = 60;

  const statusText = document.getElementById('status-text');
  const statusSub  = document.getElementById('status-sub');
  const progressBar = document.getElementById('progress-bar');
  const elapsedEl  = document.getElementById('elapsed');
  const spinner    = document.getElementById('spinner');
  const readyIcon  = document.getElementById('ready-icon');

  let elapsed = 0;
  let done = false;

  // 経過時間・プログレスバー更新
  const timer = setInterval(() => {
    if (done) return;
    elapsed++;
    const pct = Math.min((elapsed / MAX_SECONDS) * 100, 95);
    progressBar.style.width = pct + '%';
    elapsedEl.textContent = elapsed + '秒経過';

    if (elapsed >= 15) {
      statusText.textContent = 'もうすぐ準備完了です...';
    }
    if (elapsed >= 30) {
      statusText.textContent = '起動しています。あと少しです...';
    }
  }, 1000);

  // ヘルスチェック ポーリング
  async function checkHealth() {
    if (done) return;
    try {
      const res = await fetch(HEALTH_URL, { cache: 'no-store' });
      if (res.ok) {
        done = true;
        clearInterval(timer);
        clearInterval(poller);

        // 完了表示
        spinner.style.display = 'none';
        readyIcon.style.display = 'flex';
        progressBar.style.width = '100%';
        statusText.textContent = '準備完了！';
        statusSub.textContent = 'まもなくページに移動します...';
        elapsedEl.textContent = elapsed + '秒で起動しました';

        // 1秒後にリダイレクト
        setTimeout(() => {
          window.location.href = RENDER_URL + '/';
        }, 1000);
      }
    } catch (e) {
      // まだ起動していない → 次のポーリングを待つ
    }
  }

  // 最初は即チェック（すでに起動済みの場合はすぐリダイレクト）
  checkHealth();
  const poller = setInterval(checkHealth, 3000);
</script>

</body>
</html>
