<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 - Wedding Photo Share</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d0d;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #f5f5f5;
      padding: 32px 16px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Wordmark ─────────────────── */
    .wordmark {
      text-align: center;
      margin-bottom: 8px;
    }

    .wordmark h1 {
      font-size: 1.15rem;
      font-weight: 700;
      font-style: italic;
      letter-spacing: 0.1px;
      color: #f5f5f5;
    }

    .wordmark p {
      font-size: 0.76rem;
      color: #666;
      margin-top: 4px;
    }

    /* ── Card ─────────────────────── */
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 18px 20px;
    }

    /* ── Tunnel status ────────────── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.starting { background: #f59e0b; animation: pulse 1.2s infinite; }
    .status-dot.ready    { background: #22c55e; }
    .status-dot.error    { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .status-text {
      font-size: 0.82rem;
      color: #999;
    }

    /* ── URL input ────────────────── */
    .field-label {
      font-size: 0.72rem;
      color: #555;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .url-row {
      display: flex;
      gap: 8px;
    }

    .url-row input {
      flex: 1;
      padding: 10px 12px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #f5f5f5;
      font-size: 0.84rem;
    }

    .url-row input::placeholder { color: #444; }
    .url-row input:focus {
      outline: none;
      border-color: #444;
    }

    .url-row button {
      padding: 10px 16px;
      background: #f5f5f5;
      color: #0d0d0d;
      border: none;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    .url-row button:active { opacity: 0.8; }

    /* ── QR section ───────────────── */
    .qr-label {
      font-size: 0.8rem;
      color: #666;
      text-align: center;
      margin-bottom: 18px;
      min-height: 1.1em;
    }

    .qr-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #qr-container {
      display: none;
      background: #fff;
      border-radius: 12px;
      padding: 14px;
    }

    #qr-img {
      display: block;
      width: 220px;
      height: 220px;
    }

    #qr-url {
      margin-top: 14px;
      font-size: 0.75rem;
      color: #22c55e;
      word-break: break-all;
      text-align: center;
    }

    .copy-btn {
      margin-top: 14px;
      padding: 8px 22px;
      background: transparent;
      color: #f5f5f5;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      display: none;
      transition: border-color 0.15s;
    }

    .copy-btn:hover { border-color: #555; }
    .copy-btn:active { background: #1f1f1f; }

    #copied-msg {
      display: none;
      margin-top: 8px;
      font-size: 0.76rem;
      color: #22c55e;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="wordmark">
    <h1>Wedding Photo Share</h1>
    <p>管理画面 — ゲストにQRコードを見せてください</p>
  </div>

  <!-- Tunnel status -->
  <div class="card">
    <div class="status-row" id="tunnel-status-bar">
      <div class="status-dot starting" id="status-dot"></div>
      <span class="status-text" id="status-text">Cloudflare Tunnel 起動中...</span>
    </div>
  </div>

  <!-- URL input -->
  <div class="card">
    <div class="field-label">公開URL</div>
    <div class="url-row">
      <input type="text" id="url-input" placeholder="トンネル起動待ち..." readonly />
      <button onclick="generateQR()">QR生成</button>
    </div>
  </div>

  <!-- QR code -->
  <div class="card">
    <p class="qr-label" id="qr-label">Cloudflare Tunnel の起動を待っています...</p>
    <div class="qr-wrapper">
      <div id="qr-container">
        <img id="qr-img" src="" alt="QR Code">
      </div>
      <div id="qr-url"></div>
      <button class="copy-btn" id="copy-btn" onclick="copyUrl()">URLをコピー</button>
      <div id="copied-msg">コピーしました</div>
    </div>
  </div>

</div>

<script>
  let pollingTimer = null;
  let tunnelReady = false;

  async function pollTunnelStatus() {
    try {
      const res = await fetch('/api/tunnel-status');
      const data = await res.json();

      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      const input = document.getElementById('url-input');

      if (data.status === 'ready' && data.url) {
        dot.className = 'status-dot ready';
        text.textContent = `接続中: ${data.url}`;
        input.value = data.url;
        input.removeAttribute('readonly');

        if (!tunnelReady) {
          tunnelReady = true;
          clearInterval(pollingTimer);
          generateQR(data.url);
        }
      } else if (data.status === 'error') {
        dot.className = 'status-dot error';
        text.textContent = 'トンネル起動に失敗しました。手動でURLを入力してください。';
        input.removeAttribute('readonly');
        input.placeholder = 'https://...';
        clearInterval(pollingTimer);
      }
    } catch (e) {
      // ignore
    }
  }

  async function generateQR(initialUrl) {
    const url = initialUrl || document.getElementById('url-input').value.trim();
    if (!url) return;

    document.getElementById('qr-label').textContent = 'QRコード生成中...';
    document.getElementById('qr-container').style.display = 'none';
    document.getElementById('copy-btn').style.display = 'none';

    try {
      const res = await fetch(`/api/qrcode?url=${encodeURIComponent(url)}`);
      const data = await res.json();

      document.getElementById('qr-img').src = data.qrcode;
      document.getElementById('qr-container').style.display = 'inline-block';
      document.getElementById('qr-url').textContent = data.url;
      document.getElementById('qr-label').textContent = 'スマホでスキャンしてください';
      document.getElementById('copy-btn').style.display = 'inline-block';
    } catch (err) {
      document.getElementById('qr-label').textContent = 'QRコード生成に失敗しました';
    }
  }

  function copyUrl() {
    const url = document.getElementById('qr-url').textContent;
    navigator.clipboard.writeText(url).then(() => {
      const msg = document.getElementById('copied-msg');
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; }, 2000);
    });
  }

  document.getElementById('url-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') generateQR();
  });

  pollTunnelStatus();
  pollingTimer = setInterval(pollTunnelStatus, 1000);
</script>

</body>
</html>
