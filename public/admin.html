<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 - Wedding Photo Share</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', -apple-system, sans-serif;
      background: linear-gradient(150deg, #0d0020 0%, #1a0535 50%, #0a0118 100%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #f0e8f8;
      padding: 32px 16px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Wordmark ─────────────────── */
    .wordmark {
      text-align: center;
      margin-bottom: 8px;
    }

    .wordmark h1 {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa 0%, #f472b6 55%, #fb923c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .wordmark p {
      font-size: 0.74rem;
      color: #7b5ea0;
      margin-top: 5px;
      font-weight: 400;
    }

    /* ── Card ─────────────────────── */
    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(167, 139, 250, 0.2);
      border-radius: 18px;
      padding: 18px 20px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    /* ── Status ───────────────────── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.starting { background: #fbbf24; animation: pulse 1.2s infinite; }
    .status-dot.ready    { background: #4ade80; }
    .status-dot.error    { background: #f87171; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .status-text {
      font-size: 0.81rem;
      color: #b09acc;
      font-weight: 400;
    }

    /* ── URL input ────────────────── */
    .field-label {
      font-size: 0.68rem;
      color: #7b5ea0;
      margin-bottom: 10px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .url-row {
      display: flex;
      gap: 8px;
    }

    .url-row input {
      flex: 1;
      padding: 10px 13px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 12px;
      color: #f0e8f8;
      font-family: 'Poppins', sans-serif;
      font-size: 0.82rem;
      font-weight: 400;
    }

    .url-row input::placeholder { color: #4a3060; }

    .url-row input:focus {
      outline: none;
      border-color: rgba(244,114,182,0.4);
    }

    .url-row button {
      padding: 10px 16px;
      background: linear-gradient(135deg, #7c3aed, #db2777, #ea580c);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(219,39,119,0.35);
      transition: opacity 0.15s;
    }

    .url-row button:active { opacity: 0.8; }

    /* ── QR section ───────────────── */
    .qr-label {
      font-size: 0.78rem;
      color: #7b5ea0;
      text-align: center;
      margin-bottom: 20px;
      font-weight: 400;
    }

    .qr-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #qr-container {
      display: none;
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 36px rgba(124,58,237,0.3);
    }

    #qr-img {
      display: block;
      width: 224px;
      height: 224px;
    }

    #qr-url {
      margin-top: 14px;
      font-size: 0.72rem;
      color: #a78bfa;
      word-break: break-all;
      text-align: center;
      font-weight: 500;
    }

    .copy-btn {
      margin-top: 14px;
      padding: 10px 26px;
      background: transparent;
      color: #f0e8f8;
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      display: none;
      transition: border-color 0.15s, background 0.15s;
    }

    .copy-btn:hover {
      border-color: rgba(244,114,182,0.5);
      background: rgba(244,114,182,0.06);
    }

    .copy-btn:active { background: rgba(244,114,182,0.12); }

    #copied-msg {
      display: none;
      margin-top: 8px;
      font-size: 0.74rem;
      color: #4ade80;
      font-weight: 500;
    }

    /* ── S3 使用量カード ──────────────── */
    .usage-title {
      font-size: 0.68rem;
      color: #7b5ea0;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .usage-main {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 10px;
    }

    .usage-used {
      font-size: 1.45rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa 0%, #f472b6 55%, #fb923c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .usage-limit {
      font-size: 0.76rem;
      color: #7b5ea0;
      font-weight: 400;
    }

    .usage-bar-wrap {
      width: 100%;
      height: 8px;
      background: rgba(167,139,250,0.15);
      border-radius: 50px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .usage-bar {
      height: 100%;
      border-radius: 50px;
      transition: width 0.6s ease;
      background: linear-gradient(90deg, #a78bfa, #f472b6, #fb923c);
    }

    .usage-bar.danger {
      background: linear-gradient(90deg, #f87171, #ef4444);
    }

    .usage-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.74rem;
      color: #9d72b8;
      font-weight: 400;
    }

    .usage-remain {
      color: #4ade80;
      font-weight: 600;
    }

    .usage-remain.danger {
      color: #f87171;
    }

    .usage-cost {
      font-size: 0.72rem;
      color: #f87171;
      margin-top: 10px;
      padding: 8px 12px;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 10px;
      display: none;
    }

    .usage-photos {
      font-size: 0.74rem;
      color: #7b5ea0;
      margin-top: 8px;
    }

    .usage-loading {
      font-size: 0.8rem;
      color: #7b5ea0;
      text-align: center;
      padding: 8px 0;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="wordmark">
    <h1>Wedding Photo Share</h1>
    <p>管理画面 — ゲストにQRコードを見せてください</p>
  </div>

  <div class="card">
    <div class="status-row">
      <div class="status-dot starting" id="status-dot"></div>
      <span class="status-text" id="status-text">Cloudflare Tunnel 起動中...</span>
    </div>
  </div>

  <div class="card">
    <div class="field-label">公開URL</div>
    <div class="url-row">
      <input type="text" id="url-input" placeholder="トンネル起動待ち..." readonly />
      <button onclick="generateQR()">QR生成</button>
    </div>
  </div>

  <!-- S3 使用量カード -->
  <div class="card" id="usage-card">
    <div class="usage-title">S3 ストレージ使用量</div>
    <div class="usage-loading" id="usage-loading">読み込み中...</div>
    <div id="usage-body" style="display:none">
      <div class="usage-main">
        <span class="usage-used" id="usage-used">0 MB</span>
        <span class="usage-limit">無料枠 5 GB</span>
      </div>
      <div class="usage-bar-wrap">
        <div class="usage-bar" id="usage-bar" style="width:0%"></div>
      </div>
      <div class="usage-meta">
        <span class="usage-photos" id="usage-photos">0 枚</span>
        <span class="usage-remain" id="usage-remain">残り 5.00 GB</span>
      </div>
      <div class="usage-cost" id="usage-cost"></div>
    </div>
  </div>

  <div class="card">
    <p class="qr-label" id="qr-label">Cloudflare Tunnel の起動を待っています...</p>
    <div class="qr-wrapper">
      <div id="qr-container">
        <img id="qr-img" src="" alt="QR Code">
      </div>
      <div id="qr-url"></div>
      <button class="copy-btn" id="copy-btn" onclick="copyUrl()">URLをコピー</button>
      <div id="copied-msg">✓ コピーしました</div>
    </div>
  </div>

</div>

<script>
  let pollingTimer = null;
  let tunnelReady = false;

  async function pollTunnelStatus() {
    try {
      const res = await fetch('/api/tunnel-status');
      const data = await res.json();

      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      const input = document.getElementById('url-input');

      if (data.status === 'ready' && data.url) {
        dot.className = 'status-dot ready';
        text.textContent = `接続中: ${data.url}`;
        input.value = data.url;
        input.removeAttribute('readonly');

        if (!tunnelReady) {
          tunnelReady = true;
          clearInterval(pollingTimer);
          generateQR(data.url);
        }
      } else if (data.status === 'error') {
        dot.className = 'status-dot error';
        text.textContent = 'トンネル起動に失敗しました。手動でURLを入力してください。';
        input.removeAttribute('readonly');
        input.placeholder = 'https://...';
        clearInterval(pollingTimer);
      }
    } catch (e) {}
  }

  async function generateQR(initialUrl) {
    const url = initialUrl || document.getElementById('url-input').value.trim();
    if (!url) return;

    document.getElementById('qr-label').textContent = 'QRコード生成中...';
    document.getElementById('qr-container').style.display = 'none';
    document.getElementById('copy-btn').style.display = 'none';

    try {
      const res = await fetch(`/api/qrcode?url=${encodeURIComponent(url)}`);
      const data = await res.json();

      document.getElementById('qr-img').src = data.qrcode;
      document.getElementById('qr-container').style.display = 'inline-block';
      document.getElementById('qr-url').textContent = data.url;
      document.getElementById('qr-label').textContent = 'スマホでスキャンしてください ✦';
      document.getElementById('copy-btn').style.display = 'inline-block';
    } catch (err) {
      document.getElementById('qr-label').textContent = 'QRコード生成に失敗しました';
    }
  }

  function copyUrl() {
    const url = document.getElementById('qr-url').textContent;
    navigator.clipboard.writeText(url).then(() => {
      const msg = document.getElementById('copied-msg');
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; }, 2000);
    });
  }

  document.getElementById('url-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') generateQR();
  });

  pollTunnelStatus();
  pollingTimer = setInterval(pollTunnelStatus, 1000);

  // ── S3 使用量 ──────────────────────────────
  function formatBytes(bytes) {
    if (bytes < 1024)             return bytes + ' B';
    if (bytes < 1024 ** 2)        return (bytes / 1024).toFixed(1) + ' KB';
    if (bytes < 1024 ** 3)        return (bytes / 1024 ** 2).toFixed(1) + ' MB';
    return (bytes / 1024 ** 3).toFixed(2) + ' GB';
  }

  async function loadS3Usage() {
    try {
      const res = await fetch('/api/s3-usage');
      if (!res.ok) throw new Error('fetch failed');
      const d = await res.json();

      document.getElementById('usage-loading').style.display = 'none';
      document.getElementById('usage-body').style.display    = 'block';

      document.getElementById('usage-used').textContent    = formatBytes(d.totalBytes);
      document.getElementById('usage-photos').textContent  = d.totalCount + ' 枚';

      const bar = document.getElementById('usage-bar');
      bar.style.width = d.usedPct + '%';

      const remainEl = document.getElementById('usage-remain');
      remainEl.textContent = '残り ' + formatBytes(d.remainBytes);

      if (d.usedPct >= 80) {
        bar.classList.add('danger');
        remainEl.classList.add('danger');
      }

      const costEl = document.getElementById('usage-cost');
      if (d.isOverFreeTier) {
        costEl.style.display = 'block';
        const overMB = (d.overBytes / 1024 ** 2).toFixed(1);
        costEl.textContent =
          `⚠ 無料枠を ${overMB} MB 超過しています。` +
          `追加料金の目安: $${d.estimatedCostUSD.toFixed(4)} USD/月`;
      }
    } catch (e) {
      document.getElementById('usage-loading').textContent = '取得に失敗しました';
    }
  }

  loadS3Usage();
</script>

</body>
</html>
