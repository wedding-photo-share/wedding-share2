<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 - Wedding Photo Share</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', -apple-system, sans-serif;
      background: linear-gradient(150deg, #0d0020 0%, #1a0535 50%, #0a0118 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: #f0e8f8;
      padding: 32px 16px 60px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Wordmark ─────────────────── */
    .wordmark {
      text-align: center;
      margin-bottom: 8px;
    }

    .wordmark h1 {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa 0%, #f472b6 55%, #fb923c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .wordmark p {
      font-size: 0.74rem;
      color: #7b5ea0;
      margin-top: 5px;
      font-weight: 400;
    }

    /* ── Tabs ─────────────────────── */
    .tabs {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(167,139,250,0.15);
      border-radius: 14px;
      padding: 4px;
    }

    .tab-btn {
      flex: 1;
      padding: 9px 6px;
      background: transparent;
      border: none;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      color: #7b5ea0;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(219,39,119,0.2));
      color: #e0c8f8;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Card ─────────────────────── */
    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(167, 139, 250, 0.2);
      border-radius: 18px;
      padding: 18px 20px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    /* ── Status ───────────────────── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.starting { background: #fbbf24; animation: pulse 1.2s infinite; }
    .status-dot.ready    { background: #4ade80; }
    .status-dot.error    { background: #f87171; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .status-text {
      font-size: 0.81rem;
      color: #b09acc;
      font-weight: 400;
    }

    /* ── URL input ────────────────── */
    .field-label {
      font-size: 0.68rem;
      color: #7b5ea0;
      margin-bottom: 10px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .url-row {
      display: flex;
      gap: 8px;
    }

    .url-row input {
      flex: 1;
      padding: 10px 13px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 12px;
      color: #f0e8f8;
      font-family: 'Poppins', sans-serif;
      font-size: 0.82rem;
      font-weight: 400;
    }

    .url-row input::placeholder { color: #4a3060; }

    .url-row input:focus {
      outline: none;
      border-color: rgba(244,114,182,0.4);
    }

    .url-row button, .btn-action {
      padding: 10px 16px;
      background: linear-gradient(135deg, #7c3aed, #db2777, #ea580c);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(219,39,119,0.35);
      transition: opacity 0.15s;
    }

    .url-row button:active, .btn-action:active { opacity: 0.8; }

    /* ── QR section ───────────────── */
    .qr-label {
      font-size: 0.78rem;
      color: #7b5ea0;
      text-align: center;
      margin-bottom: 20px;
      font-weight: 400;
    }

    .qr-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #qr-container {
      display: none;
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 36px rgba(124,58,237,0.3);
    }

    #qr-img {
      display: block;
      width: 224px;
      height: 224px;
    }

    #qr-url {
      margin-top: 14px;
      font-size: 0.72rem;
      color: #a78bfa;
      word-break: break-all;
      text-align: center;
      font-weight: 500;
    }

    .copy-btn {
      margin-top: 14px;
      padding: 10px 26px;
      background: transparent;
      color: #f0e8f8;
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      display: none;
      transition: border-color 0.15s, background 0.15s;
    }

    .copy-btn:hover {
      border-color: rgba(244,114,182,0.5);
      background: rgba(244,114,182,0.06);
    }

    #copied-msg {
      display: none;
      margin-top: 8px;
      font-size: 0.74rem;
      color: #4ade80;
      font-weight: 500;
    }

    /* ── S3 使用量カード ──────────────── */
    .usage-title {
      font-size: 0.68rem;
      color: #7b5ea0;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .usage-main {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 10px;
    }

    .usage-used {
      font-size: 1.45rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa 0%, #f472b6 55%, #fb923c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .usage-limit {
      font-size: 0.76rem;
      color: #7b5ea0;
      font-weight: 400;
    }

    .usage-bar-wrap {
      width: 100%;
      height: 8px;
      background: rgba(167,139,250,0.15);
      border-radius: 50px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .usage-bar {
      height: 100%;
      border-radius: 50px;
      transition: width 0.6s ease;
      background: linear-gradient(90deg, #a78bfa, #f472b6, #fb923c);
    }

    .usage-bar.danger {
      background: linear-gradient(90deg, #f87171, #ef4444);
    }

    .usage-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.74rem;
      color: #9d72b8;
      font-weight: 400;
    }

    .usage-remain {
      color: #4ade80;
      font-weight: 600;
    }

    .usage-remain.danger {
      color: #f87171;
    }

    .usage-cost {
      font-size: 0.72rem;
      color: #f87171;
      margin-top: 10px;
      padding: 8px 12px;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 10px;
      display: none;
    }

    .usage-photos {
      font-size: 0.74rem;
      color: #7b5ea0;
    }

    .usage-loading {
      font-size: 0.8rem;
      color: #7b5ea0;
      text-align: center;
      padding: 8px 0;
    }

    .usage-divider {
      height: 1px;
      background: rgba(167,139,250,0.15);
      margin: 14px 0;
    }

    .usage-dl-count {
      font-size: 0.74rem;
      color: #7b5ea0;
    }

    /* ── Community management ──────── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: #c4a8f0;
    }

    .btn-new {
      padding: 7px 14px;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.74rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(219,39,119,0.3);
      transition: opacity 0.15s;
    }

    .btn-new:active { opacity: 0.8; }

    /* 新規作成フォーム */
    .create-form {
      display: none;
      margin-bottom: 14px;
      padding: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(167,139,250,0.15);
      border-radius: 14px;
    }

    .create-form.open {
      display: block;
    }

    .form-field {
      margin-bottom: 10px;
    }

    .form-label {
      display: block;
      font-size: 0.66rem;
      color: #7b5ea0;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 9px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 10px;
      color: #f0e8f8;
      font-family: 'Poppins', sans-serif;
      font-size: 0.82rem;
      outline: none;
    }

    .form-input::placeholder { color: #4a3060; }
    .form-input:focus { border-color: rgba(244,114,182,0.4); }

    .form-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .btn-cancel-sm {
      padding: 8px 14px;
      background: transparent;
      color: #7b5ea0;
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.74rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-save-sm {
      padding: 8px 18px;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.74rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(219,39,119,0.25);
    }

    /* コミュニティ行 */
    .community-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 0;
      border-bottom: 1px solid rgba(167,139,250,0.1);
    }

    .community-row:last-child {
      border-bottom: none;
    }

    .community-info {
      flex: 1;
    }

    .community-name {
      font-size: 0.86rem;
      font-weight: 600;
      color: #e0c8f8;
    }

    .community-date {
      font-size: 0.7rem;
      color: #7b5ea0;
      margin-top: 2px;
    }

    .row-actions {
      display: flex;
      gap: 6px;
    }

    .btn-edit-pw {
      padding: 5px 10px;
      background: rgba(167,139,250,0.1);
      color: #a78bfa;
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-edit-pw:hover { background: rgba(167,139,250,0.18); }

    .btn-delete-sm {
      padding: 5px 10px;
      background: rgba(248,113,113,0.08);
      color: #f87171;
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-delete-sm:hover { background: rgba(248,113,113,0.15); }

    /* インライン合言葉変更フォーム */
    .inline-pw-form {
      display: none;
      margin-top: 10px;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(167,139,250,0.12);
      border-radius: 12px;
    }

    .inline-pw-form.open {
      display: block;
    }

    .warn-text {
      font-size: 0.7rem;
      color: #f87171;
      margin-bottom: 8px;
    }

    /* ユーザー管理 */
    .user-row {
      padding: 11px 0;
      border-bottom: 1px solid rgba(167,139,250,0.1);
    }

    .user-row:last-child {
      border-bottom: none;
    }

    .user-row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .user-nickname {
      font-size: 0.86rem;
      font-weight: 600;
      color: #e0c8f8;
    }

    .user-communities {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 5px;
    }

    .community-tag {
      font-size: 0.66rem;
      font-weight: 600;
      color: #a78bfa;
      background: rgba(124,58,237,0.12);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 20px;
      padding: 2px 8px;
    }

    .user-lastseen {
      font-size: 0.7rem;
      color: #7b5ea0;
      margin-top: 4px;
    }

    /* 空状態 */
    .empty-state {
      text-align: center;
      padding: 24px 0;
      font-size: 0.8rem;
      color: #7b5ea0;
    }

    /* モーダル */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #1a0535;
      border: 1px solid rgba(167,139,250,0.25);
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 340px;
    }

    .modal h3 {
      font-size: 1rem;
      font-weight: 700;
      color: #e0c8f8;
      margin-bottom: 6px;
    }

    .modal p {
      font-size: 0.76rem;
      color: #9d72b8;
      margin-bottom: 16px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .btn-modal-cancel {
      flex: 1;
      padding: 10px;
      background: transparent;
      color: #7b5ea0;
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-modal-ok {
      flex: 1;
      padding: 10px;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
    }

    .error-inline {
      font-size: 0.74rem;
      color: #f87171;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="wordmark">
    <h1>Wedding Photo Share</h1>
    <p>管理画面</p>
  </div>

  <!-- タブ -->
  <div class="tabs">
    <button class="tab-btn active">QRコード</button>
    <button class="tab-btn">コミュニティ</button>
    <button class="tab-btn">ユーザー</button>
    <button class="tab-btn">ストレージ</button>
  </div>

  <!-- ── タブ1: QRコード ── -->
  <div class="tab-panel active" id="tab-qr">

    <div class="card">
      <div class="status-row">
        <div class="status-dot starting" id="status-dot"></div>
        <span class="status-text" id="status-text">Cloudflare Tunnel 起動中...</span>
      </div>
    </div>

    <div class="card">
      <div class="field-label">公開URL</div>
      <div class="url-row">
        <input type="text" id="url-input" placeholder="https://..." />
        <button id="qr-generate-btn">QR生成</button>
      </div>
    </div>

    <div class="card">
      <p class="qr-label" id="qr-label">Cloudflare Tunnel の起動を待っています...</p>
      <div class="qr-wrapper">
        <div id="qr-container">
          <img id="qr-img" src="" alt="QR Code">
        </div>
        <div id="qr-url"></div>
        <button class="copy-btn" id="copy-btn">URLをコピー</button>
        <div id="copied-msg">✓ コピーしました</div>
      </div>
    </div>

  </div>

  <!-- ── タブ2: コミュニティ管理 ── -->
  <div class="tab-panel" id="tab-community">

    <div class="card">
      <div class="section-header">
        <div class="section-title">コミュニティ一覧</div>
        <button class="btn-new" id="btn-create-community">+ 新規作成</button>
      </div>

      <!-- 新規作成フォーム -->
      <div class="create-form" id="community-create-form">
        <div class="form-field">
          <label class="form-label">コミュニティ名</label>
          <input type="text" class="form-input" id="new-comm-name" placeholder="例: テーブルA" maxlength="50">
        </div>
        <div class="form-field">
          <label class="form-label">合言葉</label>
          <input type="text" class="form-input" id="new-comm-passphrase" placeholder="参加用の合言葉" maxlength="100">
        </div>
        <div class="error-inline" id="create-comm-error"></div>
        <div class="form-actions">
          <button class="btn-cancel-sm" id="btn-cancel-create">キャンセル</button>
          <button class="btn-save-sm" id="btn-save-create">作成</button>
        </div>
      </div>

      <!-- コミュニティリスト -->
      <div id="community-list">
        <div class="usage-loading" id="comm-loading">読み込み中...</div>
      </div>
    </div>

  </div>

  <!-- ── タブ3: ユーザー管理 ── -->
  <div class="tab-panel" id="tab-users">

    <div class="card">
      <div class="section-header">
        <div class="section-title">ユーザー一覧</div>
        <button class="btn-new" id="btn-refresh-users">更新</button>
      </div>
      <div id="user-list">
        <div class="usage-loading" id="users-loading">読み込み中...</div>
      </div>
    </div>

  </div>

  <!-- ── タブ4: ストレージ ── -->
  <div class="tab-panel" id="tab-storage">

    <div class="card" id="usage-card">
      <div class="usage-title">S3 ストレージ使用量</div>
      <div class="usage-loading" id="usage-loading">読み込み中...</div>
      <div id="usage-body" style="display:none">
        <div class="usage-main">
          <span class="usage-used" id="usage-used">0 MB</span>
          <span class="usage-limit">無料枠 5 GB</span>
        </div>
        <div class="usage-bar-wrap">
          <div class="usage-bar" id="usage-bar" style="width:0%"></div>
        </div>
        <div class="usage-meta">
          <span class="usage-photos" id="usage-photos">0 枚</span>
          <span class="usage-remain" id="usage-remain">残り 5.00 GB</span>
        </div>
        <div class="usage-cost" id="usage-cost"></div>

        <div class="usage-divider"></div>
        <div class="usage-title">データ転送（ダウンロード）</div>
        <div class="usage-main">
          <span class="usage-used" id="dl-used">0 MB</span>
          <span class="usage-limit">無料枠 100 GB/月</span>
        </div>
        <div class="usage-bar-wrap">
          <div class="usage-bar" id="dl-bar" style="width:0%"></div>
        </div>
        <div class="usage-meta">
          <span class="usage-dl-count" id="dl-count">0 回のダウンロード</span>
          <span class="usage-remain" id="dl-remain">残り 100.00 GB</span>
        </div>
        <div class="usage-cost" id="dl-cost"></div>
      </div>
    </div>

  </div>

</div>

<!-- 合言葉変更確認モーダル -->
<div class="modal-overlay" id="pw-change-modal">
  <div class="modal">
    <h3>合言葉を変更</h3>
    <p>変更すると、このコミュニティのメンバーが全員ログアウトされます。</p>
    <div class="form-field">
      <label class="form-label">新しい合言葉</label>
      <input type="text" class="form-input" id="modal-new-pw" placeholder="新しい合言葉" maxlength="100">
    </div>
    <div class="error-inline" id="modal-pw-error"></div>
    <div class="modal-actions">
      <button class="btn-modal-cancel">キャンセル</button>
      <button class="btn-modal-ok">変更する</button>
    </div>
  </div>
</div>

<script src="/js/admin.js"></script>
</body>
</html>
