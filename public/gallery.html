<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>みんなの写真 - Wedding Photo Share</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --surface: #fff;
      --border: #dbdbdb;
      --text: #262626;
      --muted: #8e8e8e;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }

    /* ── Header ─────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 700;
      font-style: italic;
      color: var(--text);
    }

    header p {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .header-actions {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
    }

    .btn-upload {
      padding: 7px 16px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.15s;
    }

    .btn-upload:active { opacity: 0.8; }

    .btn-refresh {
      padding: 7px 16px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
    }

    .btn-refresh:active { background: #f0f0f0; }

    /* ── Loading ─────────────────── */
    #loading {
      text-align: center;
      padding: 64px 20px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid #e8e8e8;
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ─────────────── */
    #empty {
      display: none;
      text-align: center;
      padding: 72px 20px;
      color: var(--muted);
    }

    #empty .icon {
      font-size: 2.4rem;
      margin-bottom: 14px;
      opacity: 0.5;
    }

    #empty p { font-size: 0.88rem; }
    #empty p + p { margin-top: 6px; font-size: 0.8rem; }

    /* ── Photo grid ──────────────── */
    #photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background: var(--surface);
    }

    @media (min-width: 600px) {
      #photo-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .photo-item {
      aspect-ratio: 1;
      overflow: hidden;
      position: relative;
      background: #efefef;
      cursor: pointer;
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.2s;
    }

    .photo-item:hover img { transform: scale(1.03); }
    .photo-item:active img { transform: scale(0.97); }

    .photo-item .dl-btn {
      position: absolute;
      bottom: 6px;
      right: 6px;
      background: rgba(0,0,0,0.52);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.18s;
    }

    .photo-item:hover .dl-btn,
    .photo-item:focus-within .dl-btn { opacity: 1; }

    @media (hover: none) {
      .photo-item .dl-btn { opacity: 1; }
    }

    /* ── Lightbox ────────────────── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.94);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #lightbox.open { display: flex; }

    #lightbox-img {
      max-width: 95vw;
      max-height: 78vh;
      object-fit: contain;
      border-radius: 4px;
    }

    #lightbox-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    #lightbox-close:hover { background: rgba(255,255,255,0.22); }

    #lightbox-actions { margin-top: 18px; }

    #lightbox-download {
      padding: 10px 28px;
      background: #fff;
      color: var(--text);
      border: none;
      border-radius: 8px;
      font-size: 0.86rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.15s;
    }

    #lightbox-download:active { opacity: 0.8; }

    #lightbox-prev, #lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    #lightbox-prev:hover, #lightbox-next:hover { background: rgba(255,255,255,0.22); }
    #lightbox-prev { left: 14px; }
    #lightbox-next { right: 14px; }
  </style>
</head>
<body>

<header>
  <h1>Wedding Photo Share</h1>
  <p id="photo-count-header">読み込み中...</p>
  <div class="header-actions">
    <a href="/" class="btn-upload">+ 写真を追加</a>
    <button class="btn-refresh" onclick="loadPhotos(true)">更新</button>
  </div>
</header>

<div id="loading">
  <div class="spinner"></div>
  読み込み中...
</div>

<div id="empty">
  <div class="icon">🌸</div>
  <p>まだ写真がありません</p>
  <p>最初の写真をシェアしてみましょう</p>
</div>

<div id="photo-grid"></div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <button id="lightbox-prev" onclick="prevPhoto()">‹</button>
  <img id="lightbox-img" src="" alt="">
  <button id="lightbox-next" onclick="nextPhoto()">›</button>
  <div id="lightbox-actions">
    <a id="lightbox-download" href="" download="">⬇ ダウンロード</a>
  </div>
</div>

<script>
  let photos = [];
  let currentIndex = 0;

  async function loadPhotos(forceRefresh = false) {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('photo-grid').innerHTML = '';
    document.getElementById('empty').style.display = 'none';
    document.getElementById('photo-count-header').textContent = '読み込み中...';

    try {
      const url = forceRefresh ? '/api/photos?refresh=1' : '/api/photos';
      const res = await fetch(url);
      const data = await res.json();
      photos = data.photos || [];
    } catch (e) {
      photos = [];
    }

    document.getElementById('loading').style.display = 'none';

    if (photos.length === 0) {
      document.getElementById('empty').style.display = 'block';
      document.getElementById('photo-count-header').textContent = '写真はまだありません';
      return;
    }

    document.getElementById('photo-count-header').textContent = `${photos.length} 枚の写真`;

    const grid = document.getElementById('photo-grid');
    photos.forEach((photo, index) => {
      const item = document.createElement('div');
      item.className = 'photo-item';

      const img = document.createElement('img');
      img.src = photo.viewUrl;
      img.alt = photo.filename;
      img.loading = 'lazy';
      img.onclick = () => openLightbox(index);

      const dlBtn = document.createElement('button');
      dlBtn.className = 'dl-btn';
      dlBtn.title = 'ダウンロード';
      dlBtn.innerHTML = '⬇';
      dlBtn.onclick = (e) => {
        e.stopPropagation();
        downloadPhoto(photo);
      };

      item.appendChild(img);
      item.appendChild(dlBtn);
      grid.appendChild(item);
    });
  }

  function openLightbox(index) {
    currentIndex = index;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function updateLightbox() {
    const photo = photos[currentIndex];
    document.getElementById('lightbox-img').src = photo.viewUrl;
    document.getElementById('lightbox-download').href = photo.downloadUrl;
    document.getElementById('lightbox-download').download = photo.filename;
    document.getElementById('lightbox-prev').style.visibility = currentIndex > 0 ? 'visible' : 'hidden';
    document.getElementById('lightbox-next').style.visibility = currentIndex < photos.length - 1 ? 'visible' : 'hidden';
  }

  function prevPhoto() {
    if (currentIndex > 0) { currentIndex--; updateLightbox(); }
  }

  function nextPhoto() {
    if (currentIndex < photos.length - 1) { currentIndex++; updateLightbox(); }
  }

  function downloadPhoto(photo) {
    const a = document.createElement('a');
    a.href = photo.downloadUrl;
    a.download = photo.filename;
    a.click();
  }

  document.addEventListener('keydown', (e) => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') prevPhoto();
    if (e.key === 'ArrowRight') nextPhoto();
  });

  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  });

  loadPhotos();
</script>
</body>
</html>
