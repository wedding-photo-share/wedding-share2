<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>みんなの写真 - Wedding Photo Share</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --grad: linear-gradient(135deg, #7c3aed 0%, #db2777 55%, #ea580c 100%);
      --grad-soft: linear-gradient(150deg, #f3e8ff 0%, #fce7f3 50%, #fff0e6 100%);
      --text: #1e0a2e;
      --muted: #9d72b8;
      --glass: rgba(255, 255, 255, 0.82);
      --glass-border: rgba(255, 255, 255, 0.7);
      --shadow: rgba(124, 58, 237, 0.16);
      --glow: rgba(219, 39, 119, 0.32);
    }

    body {
      font-family: 'Poppins', -apple-system, sans-serif;
      background: var(--grad-soft);
      background-attachment: fixed;
      min-height: 100vh;
      color: var(--text);
    }

    /* ── Header ─────────────────── */
    header {
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--glass-border);
      padding: 18px 16px 13px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 800;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 0.74rem;
      color: var(--muted);
      margin-top: 3px;
      font-weight: 400;
    }

    .header-actions {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
    }

    .btn-upload {
      padding: 8px 20px;
      background: var(--grad);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      box-shadow: 0 4px 14px var(--glow);
      transition: transform 0.12s;
    }

    .btn-upload:active { transform: scale(0.96); }

    .btn-refresh {
      padding: 8px 18px;
      background: var(--glass);
      color: #db2777;
      border: 1.5px solid rgba(219, 39, 119, 0.3);
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: background 0.12s;
    }

    .btn-refresh:active { background: rgba(255,255,255,0.95); }

    /* ── Loading ─────────────────── */
    #loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(219,39,119,0.15);
      border-top-color: #db2777;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ─────────────── */
    #empty {
      display: none;
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }

    #empty .icon { font-size: 2.8rem; margin-bottom: 16px; }
    #empty p { font-size: 0.88rem; font-weight: 500; }
    #empty p + p { margin-top: 4px; font-size: 0.78rem; font-weight: 400; }

    /* ── Grid ────────────────────── */
    .grid-wrapper {
      margin: 16px;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 10px 36px var(--shadow);
    }

    #photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background: rgba(243, 232, 255, 0.5);
    }

    @media (min-width: 600px) {
      #photo-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .photo-item {
      aspect-ratio: 1;
      overflow: hidden;
      position: relative;
      background: rgba(252, 231, 243, 0.4);
      cursor: pointer;
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.25s;
    }

    .photo-item:hover img { transform: scale(1.06); }
    .photo-item:active img { transform: scale(0.97); }

    .photo-item .dl-btn {
      position: absolute;
      bottom: 7px;
      right: 7px;
      background: rgba(255,255,255,0.9);
      color: #db2777;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.18s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    .photo-item:hover .dl-btn { opacity: 1; }

    @media (hover: none) {
      .photo-item .dl-btn { opacity: 1; }
    }

    /* ── Lightbox ────────────────── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 0, 20, 0.96);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #lightbox.open { display: flex; }

    #lightbox-img {
      max-width: 95vw;
      max-height: 76vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    #lightbox-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: none;
      border-radius: 12px;
      width: 44px;
      height: 44px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    #lightbox-close:hover { background: rgba(255,255,255,0.18); }

    #lightbox-actions { margin-top: 22px; }

    #lightbox-download {
      padding: 12px 32px;
      background: var(--grad);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      box-shadow: 0 6px 20px var(--glow);
      transition: transform 0.12s;
    }

    #lightbox-download:active { transform: scale(0.96); }

    #lightbox-prev, #lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: none;
      border-radius: 14px;
      width: 46px;
      height: 46px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    #lightbox-prev:hover, #lightbox-next:hover { background: rgba(255,255,255,0.18); }
    #lightbox-prev { left: 14px; }
    #lightbox-next { right: 14px; }
  </style>
</head>
<body>

<header>
  <h1>Wedding Photo Share</h1>
  <p id="photo-count-header">読み込み中...</p>
  <div class="header-actions">
    <a href="/" class="btn-upload">+ 写真を追加</a>
    <button class="btn-refresh" onclick="loadPhotos(true)">更新</button>
  </div>
</header>

<div id="loading">
  <div class="spinner"></div>
  読み込み中...
</div>

<div id="empty">
  <div class="icon">🌸</div>
  <p>まだ写真がありません</p>
  <p>最初の写真をシェアしてみましょう</p>
</div>

<div class="grid-wrapper" id="grid-wrapper" style="display:none">
  <div id="photo-grid"></div>
</div>

<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <button id="lightbox-prev" onclick="prevPhoto()">‹</button>
  <img id="lightbox-img" src="" alt="">
  <button id="lightbox-next" onclick="nextPhoto()">›</button>
  <div id="lightbox-actions">
    <a id="lightbox-download" href="" download="">⬇ ダウンロード</a>
  </div>
</div>

<script>
  let photos = [];
  let currentIndex = 0;

  async function loadPhotos(forceRefresh = false) {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('photo-grid').innerHTML = '';
    document.getElementById('grid-wrapper').style.display = 'none';
    document.getElementById('empty').style.display = 'none';
    document.getElementById('photo-count-header').textContent = '読み込み中...';

    try {
      const url = forceRefresh ? '/api/photos?refresh=1' : '/api/photos';
      const res = await fetch(url);
      const data = await res.json();
      photos = data.photos || [];
    } catch (e) {
      photos = [];
    }

    document.getElementById('loading').style.display = 'none';

    if (photos.length === 0) {
      document.getElementById('empty').style.display = 'block';
      document.getElementById('photo-count-header').textContent = '写真はまだありません';
      return;
    }

    document.getElementById('photo-count-header').textContent = `${photos.length} 枚の写真`;
    document.getElementById('grid-wrapper').style.display = 'block';

    const grid = document.getElementById('photo-grid');
    photos.forEach((photo, index) => {
      const item = document.createElement('div');
      item.className = 'photo-item';

      const img = document.createElement('img');
      img.src = photo.viewUrl;
      img.alt = photo.filename;
      img.loading = 'lazy';
      img.onclick = () => openLightbox(index);

      const dlBtn = document.createElement('button');
      dlBtn.className = 'dl-btn';
      dlBtn.title = 'ダウンロード';
      dlBtn.innerHTML = '⬇';
      dlBtn.onclick = (e) => {
        e.stopPropagation();
        downloadPhoto(photo);
      };

      item.appendChild(img);
      item.appendChild(dlBtn);
      grid.appendChild(item);
    });
  }

  function openLightbox(index) {
    currentIndex = index;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function updateLightbox() {
    const photo = photos[currentIndex];
    document.getElementById('lightbox-img').src = photo.viewUrl;
    const dlLink = document.getElementById('lightbox-download');
    dlLink.href = photo.downloadUrl;
    dlLink.download = photo.filename;
    dlLink.onclick = () => {
      fetch('/api/track-download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: photo.key, size: photo.size }),
      }).catch(() => {});
    };
    document.getElementById('lightbox-prev').style.visibility = currentIndex > 0 ? 'visible' : 'hidden';
    document.getElementById('lightbox-next').style.visibility = currentIndex < photos.length - 1 ? 'visible' : 'hidden';
  }

  function prevPhoto() {
    if (currentIndex > 0) { currentIndex--; updateLightbox(); }
  }

  function nextPhoto() {
    if (currentIndex < photos.length - 1) { currentIndex++; updateLightbox(); }
  }

  function downloadPhoto(photo) {
    // ダウンロードをトラッキング（fire-and-forget）
    fetch('/api/track-download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: photo.key, size: photo.size }),
    }).catch(() => {});

    const a = document.createElement('a');
    a.href = photo.downloadUrl;
    a.download = photo.filename;
    a.click();
  }

  document.addEventListener('keydown', (e) => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') prevPhoto();
    if (e.key === 'ArrowRight') nextPhoto();
  });

  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  });

  loadPhotos();
</script>
</body>
</html>
