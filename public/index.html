<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Wedding Photo Share</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --grad: linear-gradient(135deg, #7c3aed 0%, #db2777 55%, #ea580c 100%);
      --grad-soft: linear-gradient(150deg, #f3e8ff 0%, #fce7f3 50%, #fff0e6 100%);
      --text: #1e0a2e;
      --muted: #9d72b8;
      --glass: rgba(255, 255, 255, 0.82);
      --glass-border: rgba(255, 255, 255, 0.7);
      --shadow: rgba(124, 58, 237, 0.16);
      --glow: rgba(219, 39, 119, 0.32);
    }

    body {
      font-family: 'Poppins', -apple-system, sans-serif;
      background: var(--grad-soft);
      background-attachment: fixed;
      min-height: 100vh;
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────── */
    header {
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--glass-border);
      text-align: center;
      padding: 16px 16px 12px;
    }

    header h1 {
      font-size: 1.55rem;
      font-weight: 800;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .header-sub {
      font-size: 0.76rem;
      color: var(--muted);
      margin-top: 3px;
      font-weight: 400;
    }

    .header-actions {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .btn-sm {
      padding: 7px 16px;
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.76rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      border: none;
      transition: transform 0.12s;
    }

    .btn-sm:active { transform: scale(0.96); }

    .btn-community {
      background: var(--grad);
      color: #fff;
      box-shadow: 0 3px 12px var(--glow);
    }

    .btn-logout {
      background: var(--glass);
      color: var(--muted);
      border: 1.5px solid rgba(157, 114, 184, 0.3);
    }

    #user-name-display {
      font-size: 0.76rem;
      color: var(--muted);
      margin-top: 3px;
      font-weight: 400;
    }

    /* ── Main ───────────────────── */
    main {
      flex: 1;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      padding: 20px 18px 36px;
    }

    /* ── Destination selector ────── */
    .dest-selector {
      margin-bottom: 14px;
    }

    .dest-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    .dest-options {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .dest-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--glass);
      border: 1.5px solid var(--glass-border);
      border-radius: 14px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-size: 0.84rem;
      font-weight: 500;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s;
      text-align: left;
    }

    .dest-option:active { transform: scale(0.98); }

    .dest-option.selected {
      border-color: rgba(219, 39, 119, 0.5);
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 2px 12px rgba(219, 39, 119, 0.12);
    }

    .dest-option.selected-community {
      border-color: rgba(124, 58, 237, 0.5);
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 2px 12px rgba(124, 58, 237, 0.12);
    }

    .dest-radio {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(157, 114, 184, 0.4);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dest-option.selected .dest-radio,
    .dest-option.selected-community .dest-radio {
      border-color: #db2777;
      background: #db2777;
    }

    .dest-option.selected-community .dest-radio {
      border-color: #7c3aed;
      background: #7c3aed;
    }

    .dest-radio::after {
      content: '';
      width: 7px;
      height: 7px;
      background: white;
      border-radius: 50%;
      display: none;
    }

    .dest-option.selected .dest-radio::after,
    .dest-option.selected-community .dest-radio::after {
      display: block;
    }

    /* ── Drop area ──────────────── */
    .drop-area {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1.5px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 8px 32px var(--shadow), 0 0 0 0 transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 52px 24px;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
    }

    .drop-area:active {
      transform: scale(0.97);
      box-shadow: 0 4px 16px var(--shadow);
    }

    .camera-ring {
      width: 68px;
      height: 68px;
      border-radius: 20px;
      background: var(--grad);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px var(--glow);
    }

    .camera-ring svg {
      width: 30px;
      height: 30px;
      stroke: #fff;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .drop-area h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .drop-area small {
      font-size: 0.76rem;
      color: var(--muted);
      font-weight: 400;
    }

    #fileInput { display: none; }

    /* ── Preview ────────────────── */
    #preview-section {
      display: none;
      margin-top: 14px;
    }

    #preview-section h2 {
      font-size: 0.74rem;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 8px;
    }

    #preview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      border-radius: 18px;
      overflow: hidden;
    }

    .preview-item {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      background: rgba(255,255,255,0.4);
    }

    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .preview-item .remove-btn {
      position: absolute;
      top: 5px;
      right: 5px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview-item .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .preview-item.uploading .overlay { opacity: 1; background: rgba(124,58,237,0.4); }
    .preview-item.done      .overlay { opacity: 1; background: rgba(22,163,74,0.4); }
    .preview-item.error     .overlay { opacity: 1; background: rgba(220,38,38,0.4); }

    .overlay-icon { color: #fff; font-size: 1.4rem; }

    /* ── Upload button ──────────── */
    #upload-btn {
      display: none;
      width: 100%;
      margin-top: 14px;
      padding: 16px;
      background: var(--grad);
      color: #fff;
      border: none;
      border-radius: 16px;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.2px;
      box-shadow: 0 8px 24px var(--glow);
      transition: transform 0.12s, box-shadow 0.12s;
    }

    #upload-btn:active {
      transform: scale(0.97);
      box-shadow: 0 4px 12px var(--glow);
    }

    #upload-btn:disabled {
      background: linear-gradient(135deg, #c4b0e0, #e0a0c8);
      box-shadow: none;
      cursor: not-allowed;
    }

    /* ── Progress ───────────────── */
    #progress-section {
      display: none;
      margin-top: 16px;
    }

    #progress-bar-wrap {
      background: rgba(255,255,255,0.5);
      border-radius: 50px;
      height: 5px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      background: var(--grad);
      border-radius: 50px;
      transition: width 0.3s;
      width: 0%;
    }

    #progress-text {
      text-align: center;
      font-size: 0.74rem;
      color: var(--muted);
      margin-top: 10px;
      font-weight: 500;
    }

    /* ── Success ────────────────── */
    #success-section {
      display: none;
      text-align: center;
      padding: 52px 24px;
    }

    .check-ring {
      width: 76px;
      height: 76px;
      border-radius: 22px;
      background: var(--grad);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 8px 28px var(--glow);
    }

    .check-ring svg {
      width: 34px;
      height: 34px;
      stroke: #fff;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #success-section h2 {
      font-size: 1.5rem;
      font-weight: 800;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    #success-section p {
      font-size: 0.84rem;
      color: var(--muted);
      font-weight: 400;
    }

    #again-btn {
      margin-top: 24px;
      padding: 13px 32px;
      background: transparent;
      color: #db2777;
      border: 1.5px solid #db2777;
      border-radius: 14px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    #again-btn:active { background: rgba(219,39,119,0.08); }

    .gallery-link-small {
      display: block;
      margin-top: 18px;
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      font-weight: 500;
    }

    /* ── Footer ─────────────────── */
    footer {
      border-top: 1px solid var(--glass-border);
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      text-align: center;
      padding: 14px;
    }

    footer a {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
    }

    .footer-logout {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      padding: 4px 8px;
    }

    .btn-gallery {
      background: var(--glass);
      color: var(--muted);
      border: 1.5px solid rgba(157, 114, 184, 0.3);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
  </style>
</head>
<body>

<script>
  // 認証チェック（先頭で実行）
  (function() {
    const token = localStorage.getItem('authToken');
    if (!token) {
      location.replace('/login?redirect=' + encodeURIComponent(location.pathname + location.search));
    }
  })();
</script>

<header>
  <h1>Wedding Photo Share</h1>
  <div class="header-sub" id="user-name-display">読み込み中...</div>
  <div class="header-actions" id="header-actions">
    <button class="btn-sm btn-community" id="btn-community-gallery" style="display:none" onclick="location.href='/gallery/community?id=' + encodeURIComponent(window._communities[0]?.id || '')">コミュニティ写真</button>
    <a href="/gallery" class="btn-sm btn-gallery">みんなの写真を見る</a>
  </div>
</header>

<main>
  <div id="upload-section">
    <!-- 投稿先セレクター -->
    <div class="dest-selector" id="dest-selector" style="display:none">
      <div class="dest-label">投稿先</div>
      <div class="dest-options" id="dest-options">
        <button class="dest-option selected" data-community-id="" onclick="selectDest(this)">
          <div class="dest-radio"></div>
          <span>🌸 全員に公開</span>
        </button>
      </div>
    </div>

    <div class="drop-area" onclick="document.getElementById('fileInput').click()">
      <div class="camera-ring">
        <svg viewBox="0 0 24 24">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <h2>写真を選択する</h2>
      <small>複数枚まとめて選択できます</small>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple>

    <div id="preview-section">
      <h2 id="preview-count"></h2>
      <div id="preview-grid"></div>
    </div>

    <button id="upload-btn">シェアする ✦</button>

    <div id="progress-section">
      <div id="progress-bar-wrap">
        <div id="progress-bar"></div>
      </div>
      <div id="progress-text">アップロード中...</div>
    </div>
  </div>

  <div id="success-section">
    <div class="check-ring">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h2>Thank you!</h2>
    <p>素敵な写真をありがとうございます ✨</p>
    <button id="again-btn" onclick="resetPage()">続けて送る</button>
    <a href="/gallery" class="gallery-link-small">みんなの写真を見る →</a>
  </div>
</main>

<footer>
  <button class="footer-logout" onclick="doLogout()">ログアウト</button>
</footer>

<script>
  // authFetch: 401時に自動ログアウト
  async function authFetch(url, options = {}) {
    const token = localStorage.getItem('authToken');
    const headers = {
      ...(options.headers || {}),
      'Authorization': 'Bearer ' + token,
    };
    const res = await fetch(url, { ...options, headers });
    if (res.status === 401) {
      localStorage.removeItem('authToken');
      location.replace('/login?redirect=' + encodeURIComponent(location.pathname + location.search));
      throw new Error('認証エラー');
    }
    return res;
  }

  function doLogout() {
    localStorage.removeItem('authToken');
    location.replace('/login');
  }

  window._communities = [];
  let selectedCommunityId = null; // null = 公開

  // ページロード時に認証情報取得
  async function initPage() {
    try {
      const res = await authFetch('/api/auth/me');
      const data = await res.json();
      const user = data.user;

      document.getElementById('user-name-display').textContent = user.nickname + ' さん、おかえりなさい';

      if (user.communities && user.communities.length > 0) {
        window._communities = user.communities;

        // コミュニティ写真ボタン表示（コミュニティがある場合のみ）
        document.getElementById('btn-community-gallery').style.display = 'inline-block';

        // 投稿先セレクター構築
        const destOptions = document.getElementById('dest-options');
        const destSelector = document.getElementById('dest-selector');

        // コミュニティオプション追加
        user.communities.forEach(community => {
          const btn = document.createElement('button');
          btn.className = 'dest-option';
          btn.dataset.communityId = community.id;
          btn.onclick = function() { selectDest(this); };
          btn.innerHTML = `<div class="dest-radio"></div><span>🔒 ${community.name} だけに共有</span>`;
          destOptions.appendChild(btn);
        });

        destSelector.style.display = 'block';

        // URLパラメータで指定されたコミュニティを自動選択
        if (window._preselectedCommunityId) {
          const targetBtn = document.querySelector(`.dest-option[data-community-id="${window._preselectedCommunityId}"]`);
          if (targetBtn) selectDest(targetBtn);
        }
      }
    } catch (err) {
      if (err.message !== '認証エラー') {
        document.getElementById('user-name-display').textContent = '';
      }
    }
  }

  function selectDest(btn) {
    document.querySelectorAll('.dest-option').forEach(el => {
      el.classList.remove('selected', 'selected-community');
    });
    const communityId = btn.dataset.communityId;
    selectedCommunityId = communityId || null;
    if (communityId) {
      btn.classList.add('selected-community');
    } else {
      btn.classList.add('selected');
    }
  }

  // URLパラメータからcommunityIdを読んで投稿先を自動選択
  (function() {
    const urlParams = new URLSearchParams(location.search);
    const preselectedCommunityId = urlParams.get('communityId');
    if (preselectedCommunityId) {
      window._preselectedCommunityId = preselectedCommunityId;
    }
  })();

  initPage();

  // ── アップロード処理 ──────────────────────────────────────────

  const fileInput = document.getElementById('fileInput');
  const previewSection = document.getElementById('preview-section');
  const previewGrid = document.getElementById('preview-grid');
  const previewCount = document.getElementById('preview-count');
  const uploadBtn = document.getElementById('upload-btn');
  const progressSection = document.getElementById('progress-section');
  const progressBar = document.getElementById('progress-bar');
  const progressText = document.getElementById('progress-text');
  const successSection = document.getElementById('success-section');
  const uploadSection = document.getElementById('upload-section');

  let selectedFiles = [];

  fileInput.addEventListener('change', (e) => {
    const newFiles = Array.from(e.target.files);
    selectedFiles = [...selectedFiles, ...newFiles];
    renderPreviews();
    fileInput.value = '';
  });

  function renderPreviews() {
    previewGrid.innerHTML = '';
    if (selectedFiles.length === 0) {
      previewSection.style.display = 'none';
      uploadBtn.style.display = 'none';
      return;
    }

    previewSection.style.display = 'block';
    uploadBtn.style.display = 'block';
    previewCount.textContent = `選択中: ${selectedFiles.length} 枚`;

    selectedFiles.forEach((file, index) => {
      const item = document.createElement('div');
      item.className = 'preview-item';
      item.id = `preview-${index}`;

      const img = document.createElement('img');
      img.src = URL.createObjectURL(file);

      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove-btn';
      removeBtn.textContent = '×';
      removeBtn.onclick = (e) => {
        e.stopPropagation();
        selectedFiles.splice(index, 1);
        renderPreviews();
      };

      const overlay = document.createElement('div');
      overlay.className = 'overlay';
      const overlayIcon = document.createElement('span');
      overlayIcon.className = 'overlay-icon';
      overlay.appendChild(overlayIcon);

      item.appendChild(img);
      item.appendChild(removeBtn);
      item.appendChild(overlay);
      previewGrid.appendChild(item);
    });
  }

  uploadBtn.addEventListener('click', async () => {
    if (selectedFiles.length === 0) return;

    uploadBtn.disabled = true;
    progressSection.style.display = 'block';

    let completed = 0;
    let failed = 0;

    for (let i = 0; i < selectedFiles.length; i++) {
      const file = selectedFiles[i];
      const item = document.getElementById(`preview-${i}`);
      const overlay = item.querySelector('.overlay');
      const overlayIcon = item.querySelector('.overlay-icon');

      item.classList.add('uploading');
      overlayIcon.textContent = '⏳';

      try {
        const body = { filename: file.name, contentType: file.type || 'image/jpeg' };
        if (selectedCommunityId) {
          body.communityId = selectedCommunityId;
        }

        const res = await authFetch('/api/presigned-url', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!res.ok) throw new Error('URL取得失敗');
        const { url } = await res.json();

        const uploadRes = await fetch(url, {
          method: 'PUT',
          body: file,
          headers: { 'Content-Type': file.type || 'image/jpeg' },
        });

        if (!uploadRes.ok) throw new Error('アップロード失敗');

        item.classList.remove('uploading');
        item.classList.add('done');
        overlayIcon.textContent = '✓';
        completed++;
      } catch (err) {
        if (err.message === '認証エラー') return;
        item.classList.remove('uploading');
        item.classList.add('error');
        overlayIcon.textContent = '✗';
        failed++;
        console.error(err);
      }

      const progress = Math.round(((i + 1) / selectedFiles.length) * 100);
      progressBar.style.width = progress + '%';
      progressText.textContent = `${i + 1} / ${selectedFiles.length} 枚処理中...`;
    }

    progressText.textContent = `完了: ${completed} 枚成功${failed > 0 ? ` / ${failed} 枚失敗` : ''}`;

    if (completed > 0) {
      authFetch('/api/invalidate-cache', { method: 'POST' }).catch(() => {});
    }

    setTimeout(() => {
      if (completed > 0) {
        uploadSection.style.display = 'none';
        successSection.style.display = 'block';
      }
      uploadBtn.disabled = false;
    }, 800);
  });

  function resetPage() {
    selectedFiles = [];
    renderPreviews();
    progressSection.style.display = 'none';
    progressBar.style.width = '0%';
    uploadSection.style.display = 'block';
    successSection.style.display = 'none';
  }
</script>

</body>
</html>
