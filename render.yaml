services:
  - type: web
    name: wedding-memories
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: ap-northeast-1
      - key: ADMIN_PASSWORD
        sync: false
